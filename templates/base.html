<!doctype html>
<html>
  <head>
    <title>SE 60, 1 Beresford Road</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f8fafc;
      }
      .card-modern {
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        border: none;
      }
      .btn-primary {
        border-radius: 12px;
        padding: 12px;
        font-weight: 600;
      }
      .form-control {
        border-radius: 12px;
        padding: 12px;
      }
      .navbar {
        padding: 18px;
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-dark bg-primary">
      <div class="container d-flex justify-content-between">
        <span class="navbar-brand fw-bold fs-4">SE 60, 1 Beresford Road</span>
        {% if session.get('admin') %}
        <a href="/dashboard" class="btn btn-light btn-sm rounded-pill">
          Dashboard
        </a>
        {% endif %}
      </div>
    </nav>

    <div class="container py-5">
      {% with messages = get_flashed_messages(with_categories=true) %} {% for
      category, message in messages %}
      <div class="alert alert-{{ category }} rounded-3">{{ message }}</div>
      {% endfor %} {% endwith %} {% block content %}{% endblock %}
    </div>
  </body>
</html>
